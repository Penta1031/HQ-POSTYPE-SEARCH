<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 🌟 구글 드라이브 리퍼러 차단 우회를 위한 설정 -->
    <meta name="referrer" content="no-referrer">
    <title>혚쾌버블 아카이브</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #e5e7eb; font-family: 'Pretendard', sans-serif; }
        
        /* 미디어 컨텐츠 기본 스타일 */
        .media-content { border-radius: 20px; overflow: hidden; max-width: 280px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .media-content:active { transform: scale(0.98); }
        
        /* 이미지/영상 썸네일 모드 */
        .thumbnail-mode { background-color: #f3f4f6; min-height: 100px; display: flex; align-items: center; justify-content: center; position: relative; }
        .thumbnail-mode img { width: 100%; height: auto; max-height: 400px; border-radius: 20px; object-fit: cover; }
        
        /* 🌟 오디오 인터페이스 스타일 (재생바 포함) */
        .audio-player-bubble { width: 280px; padding: 12px 16px; border-radius: 22px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        .audio-player-bubble.artist { background-color: #ffffff; border: 1px solid #e5e7eb; color: #3b82f6; }
        .audio-player-bubble.user { background-color: #3b82f6; color: white; }

        .play-toggle-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .audio-progress-container { flex-grow: 1; height: 4px; background-color: rgba(0, 0, 0, 0.08); border-radius: 2px; position: relative; overflow: hidden; }
        .audio-player-bubble.user .audio-progress-container { background-color: rgba(255, 255, 255, 0.25); }
        .audio-progress-bar { height: 100%; width: 0%; background-color: currentColor; border-radius: 2px; transition: width 0.1s linear; }
        .audio-time-label { font-size: 11px; font-weight: 600; min-width: 32px; text-align: right; opacity: 0.8; }

        /* 재생 버튼 오버레이 (일반 영상용) */
        .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background-color: rgba(0, 0, 0, 0.2); }
        .play-icon { width: 40px; height: 40px; color: white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

        /* 비디오/이미지 팝업 (모달) 스타일 */
        #videoPopup { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; background-color: rgba(0, 0, 0, 0.9); }
        #videoPopup .popup-content { position: relative; width: 100%; max-width: 1000px; max-height: 90vh; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; }
        #videoPopup iframe { width: 100%; aspect-ratio: 16 / 9; border: none; }
        #videoPopup img { max-width: 100%; max-height: 90vh; object-fit: contain; }
        #videoPopup .close-btn { position: absolute; top: 15px; right: 15px; color: white; cursor: pointer; font-weight: bold; font-size: 18px; z-index: 10; background: rgba(0,0,0,0.5); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        .img-error { font-size: 11px; color: #9ca3af; text-align: center; padding: 10px; background: #fff; border-radius: 12px; border: 1px solid #eee; width: 100%; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #f4ad3b; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #searchContainer { transition: all 0.3s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        #searchContainer.active { max-height: 80px; opacity: 1; padding: 8px 16px; }

        .tab-btn { position: relative; flex: 1; text-align: center; padding: 12px; font-weight: 600; font-size: 14px; color: #9ca3af; transition: color 0.2s; }
        .tab-btn.active { color: #3b82f6; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background-color: #3b82f6; border-radius: 2px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background-color: #fff; }
        .gallery-item { aspect-ratio: 1 / 1; overflow: hidden; position: relative; cursor: pointer; background-color: #f3f4f6; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .highlight { background-color: #fef08a; color: #1a1a1a; padding: 0 2px; border-radius: 2px; font-weight: bold; }
        .highlight-active { background-color: #facc15; box-shadow: 0 0 0 2px #facc15; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <p class="text-gray-600 font-medium text-sm">데이터를 연결하는 중...</p>
    </div>

    <!-- 미디어 팝업 레이어 -->
    <div id="videoPopup" onclick="closePopup()">
        <div class="popup-content" id="popupContent" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePopup()">✕</div>
        </div>
    </div>

    <!-- 프로필 선택 -->
    <div id="selectionScreen" class="w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col items-center justify-center shadow-2xl relative">
        <h1 class="text-xl font-bold text-gray-800 mb-10">혚쾌버블 아카이브</h1>
        <div class="flex gap-10">
            <button onclick="enterChat('혀비')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-20 h-20 rounded-full border-2 border-white overflow-hidden shadow-sm">
                    <img src="https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-semibold text-lg text-center">혀비</span>
            </button>
            <button onclick="enterChat('유말랑')" class="flex flex-col items-center gap-3 hover:scale-105 transition-transform focus:outline-none">
                <div class="w-20 h-20 rounded-full border-2 border-white overflow-hidden shadow-sm">
                    <img src="https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small" class="w-full h-full object-cover">
                </div>
                <span class="text-gray-800 font-semibold text-lg text-center">유말랑</span>
            </button>
        </div>
    </div>

    <!-- 채팅/갤러리 화면 -->
    <div id="chatScreen" class="hidden w-full max-w-[400px] h-[100dvh] sm:h-[800px] sm:rounded-[2rem] bg-[#f2f3f5] flex flex-col shadow-2xl overflow-hidden relative border-x border-gray-200">
        <header class="bg-[#f2f3f5]/90 backdrop-blur-sm z-30 p-4 flex justify-between items-center border-b border-gray-200/50 sticky top-0">
            <button onclick="location.reload()" class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="text-[17px] font-bold text-gray-800" id="roomName">아티스트</div>
            <button onclick="toggleSearch()" class="p-1 hover:bg-gray-200 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
        </header>

        <div class="flex bg-white border-b border-gray-100 z-20">
            <button id="chatTab" onclick="switchView('chat')" class="tab-btn active">채팅</button>
            <button id="galleryTab" onclick="switchView('gallery')" class="tab-btn">갤러리</button>
        </div>

        <div id="searchContainer" class="bg-white border-b border-gray-100 z-20">
            <div class="flex items-center gap-2">
                <div class="relative flex-1 flex items-center bg-gray-100 rounded-full px-3">
                    <input type="text" id="searchInput" placeholder="검색어 입력..." 
                           class="w-full py-2 bg-transparent text-sm focus:outline-none transition-all"
                           oninput="handleSearchInput()">
                    <button id="clearSearchBtn" onclick="cancelSearch()" class="hidden text-gray-400 hover:text-gray-600 p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="searchNav" class="hidden flex items-center gap-1 text-[12px] font-bold text-gray-500 whitespace-nowrap px-1">
                    <button onclick="navSearch(-1)" class="p-1.5 hover:bg-gray-100 rounded-lg">▲</button>
                    <span id="searchStatus">0 / 0</span>
                    <button onclick="navSearch(1)" class="p-1.5 hover:bg-gray-100 rounded-lg">▼</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col relative">
            <main id="chatArea" class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-1 pb-6 bg-[#f2f3f5]"></main>
            <main id="galleryArea" class="hidden flex-1 overflow-y-auto no-scrollbar bg-white"></main>
        </div>
    </div>

    <script>
        let shData = [], hsData = [], mediaMap = {};
        let currentArtistData = [];
        let displayedCount = 0; 
        let currentArtistName = "";
        let currentView = 'chat';
        const PAGE_SIZE = 150;
        
        let searchIndices = [];
        let currentMatchIdx = -1;
        let activeQuery = "";

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTiiqBBRaOAc7OxW3NpJC5aRcIyq_V7xFLlDHgoN6trdI-xc0jxfJ_ak-qmeCIvjDKSWwgThnT1SK92/pub?gid=2099676467&single=true&output=csv";

        const testMappings = {
            "sh_2020_11_5_음성 - 1.mp4": "https://drive.google.com/file/d/1Z5VJyQfhQAa8S32LN8XxHjSjgI1LuIpw/preview",
            "hs_20201126.jpg": "https://drive.google.com/uc?export=view&id=1RP7Gk8riTznCh3Uh1l1p2QEmvgFGEXqS",
            "hs_20201106_2.jpg": "https://drive.google.com/uc?export=view&id=1o_Z3hKO-c3uoWcHdrZ_-MNeQxR0Bh97w"
        };

        function superClean(name) {
            if (!name) return "";
            return name.toString().split('.')[0].replace(/[^a-z0-9가-힣]/gi, '').toLowerCase();
        }

        async function loadData() {
            const overlay = document.getElementById('loadingOverlay');
            try {
                const [shRes, hsRes, csvRes] = await Promise.all([
                    fetch('./sh_data.json'), fetch('./hs_data.json'), fetch(CSV_URL)
                ]);
                shData = await shRes.json();
                hsData = await hsRes.json();
                
                const csvText = await csvRes.text();
                const rows = csvText.split('\n').slice(1);
                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    if (columns.length >= 3) {
                        const rawName = columns[0]?.replace(/"/g, '').trim();
                        const link = columns[2]?.replace(/"/g, '').trim();
                        if(rawName && link) {
                            mediaMap[rawName.replace(/\s+/g, '').toLowerCase()] = link;
                            const superKey = superClean(rawName);
                            if (superKey) mediaMap[superKey] = link;
                        }
                    }
                });

                for (let key in testMappings) {
                    mediaMap[key.replace(/\s+/g, '').toLowerCase()] = testMappings[key];
                    const superKey = superClean(key);
                    if (superKey) mediaMap[superKey] = testMappings[key];
                }

                const sortFn = (a, b) => parseDate(a.date) - parseDate(b.date);
                shData.sort(sortFn); hsData.sort(sortFn);

                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            } catch (e) {
                overlay.innerHTML = "<p class='text-red-500 text-center p-4'>데이터 로드 실패</p>";
            }
        }
        window.onload = loadData;

        function parseDate(dateStr) {
            let s = dateStr.replace(/-/g, '/');
            if (s.includes('AM') || s.includes('PM')) {
                let [d, t] = s.split(' ');
                let [h, m] = t.replace(/AM|PM/g, '').split(':');
                h = parseInt(h);
                if (t.includes('PM') && h !== 12) h += 12;
                if (t.includes('AM') && h === 12) h = 0;
                s = `${d} ${h}:${m}`;
            }
            return new Date(s);
        }

        function toggleSearch() {
            const container = document.getElementById('searchContainer');
            container.classList.toggle('active');
            if (!container.classList.contains('active')) {
                cancelSearch();
            } else {
                document.getElementById('searchInput').focus();
            }
        }

        function cancelSearch() {
            const input = document.getElementById('searchInput');
            const nav = document.getElementById('searchNav');
            const clearBtn = document.getElementById('clearSearchBtn');
            const chatArea = document.getElementById('chatArea');
            const currentScroll = chatArea.scrollTop;

            input.value = "";
            activeQuery = "";
            searchIndices = [];
            currentMatchIdx = -1;
            
            nav.classList.add('hidden');
            clearBtn.classList.add('hidden');
            renderMessages(currentArtistName, true);
            
            setTimeout(() => { chatArea.scrollTop = currentScroll; }, 0);
        }

        function handleSearchInput() {
            const query = document.getElementById('searchInput').value.trim();
            const nav = document.getElementById('searchNav');
            const clearBtn = document.getElementById('clearSearchBtn');
            
            if (query.length < 1) {
                activeQuery = "";
                searchIndices = [];
                currentMatchIdx = -1;
                nav.classList.add('hidden');
                clearBtn.classList.add('hidden');
                renderMessages(currentArtistName, true);
                return;
            }

            clearBtn.classList.remove('hidden');
            activeQuery = query;
            const lowerQuery = query.toLowerCase();
            
            searchIndices = [];
            currentArtistData.forEach((item, idx) => {
                const text = (item.content || "").toLowerCase();
                const date = (item.date || "").toLowerCase();
                if (text.includes(lowerQuery) || date.includes(lowerQuery)) {
                    searchIndices.push(idx);
                }
            });

            if (searchIndices.length > 0) {
                nav.classList.remove('hidden');
                if (currentMatchIdx === -1) currentMatchIdx = 0;
                updateSearchUI();
                jumpToMatch(searchIndices[currentMatchIdx]);
            } else {
                currentMatchIdx = -1;
                updateSearchUI();
            }
        }

        function updateSearchUI() {
            const status = document.getElementById('searchStatus');
            if (searchIndices.length === 0) {
                status.innerText = "0 / 0";
            } else {
                status.innerText = `${currentMatchIdx + 1} / ${searchIndices.length}`;
            }
        }

        function navSearch(dir) {
            if (searchIndices.length === 0) return;
            currentMatchIdx += dir;
            if (currentMatchIdx < 0) currentMatchIdx = searchIndices.length - 1;
            if (currentMatchIdx >= searchIndices.length) currentMatchIdx = 0;
            updateSearchUI();
            jumpToMatch(searchIndices[currentMatchIdx]);
        }

        function jumpToMatch(dataIdx) {
            if (dataIdx >= displayedCount) {
                displayedCount = Math.min(dataIdx + PAGE_SIZE, currentArtistData.length);
                renderMessages(currentArtistName, true);
            } else {
                renderMessages(currentArtistName, true);
            }

            setTimeout(() => {
                const target = document.getElementById(`msg-${dataIdx}`);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const bubble = target.querySelector('.bubble-content');
                    if (bubble) {
                        bubble.classList.add('highlight-active');
                        setTimeout(() => bubble.classList.remove('highlight-active'), 1500);
                    }
                }
            }, 100);
        }

        function switchView(view) {
            currentView = view;
            const chatArea = document.getElementById('chatArea');
            const galleryArea = document.getElementById('galleryArea');
            const chatTab = document.getElementById('chatTab');
            const galleryTab = document.getElementById('galleryTab');

            if (view === 'chat') {
                chatArea.classList.remove('hidden');
                galleryArea.classList.add('hidden');
                chatTab.classList.add('active');
                galleryTab.classList.remove('active');
            } else {
                chatArea.classList.add('hidden');
                galleryArea.classList.remove('hidden');
                chatTab.classList.remove('active');
                galleryTab.classList.add('active');
                renderGallery();
            }
        }

        function showPopup(fileId, type = 'video') {
            const popup = document.getElementById('videoPopup');
            const container = document.getElementById('popupContent');
            container.innerHTML = '<div class="close-btn" onclick="closePopup()">✕</div>';

            if (type === 'image') {
                const img = document.createElement('img');
                img.src = `https://drive.google.com/thumbnail?authuser=0&sz=w1600&id=${fileId}`;
                img.onerror = () => {
                    container.innerHTML += `<div class="img-error"><p>이미지 로드 실패</p><a href="https://drive.google.com/file/d/${fileId}/view" target="_blank" class="text-blue-500 font-bold mt-2 block underline">원본 링크 열기</a></div>`;
                };
                container.appendChild(img);
            } else {
                const iframe = document.createElement('iframe');
                iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
                iframe.allow = "autoplay; fullscreen";
                container.appendChild(iframe);
            }
            popup.style.display = 'flex';
        }

        function closePopup() {
            const container = document.getElementById('popupContent');
            container.innerHTML = '<div class="close-btn" onclick="closePopup()">✕</div>';
            document.getElementById('videoPopup').style.display = 'none';
        }

        function getMediaUrls(url) {
            let id = "";
            if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            else if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0];
            return {
                iframe: id ? `https://drive.google.com/file/d/${id}/preview` : url,
                image: id ? `https://drive.google.com/thumbnail?authuser=0&sz=w1000&id=${id}` : url,
                // 🌟 confirm=t 옵션을 추가하여 바이러스 검사 경고창을 건너뛰고 바로 소스를 불러옴
                direct: id ? `https://drive.google.com/uc?export=download&id=${id}&confirm=t` : url, 
                id: id
            };
        }

        // 🌟 실시간 오디오(비디오 백그라운드) 재생 제어 로직
        function toggleAudio(btn, audioId) {
            const media = document.getElementById(audioId);
            const container = btn.closest('.audio-player-bubble');
            const progressBar = container.querySelector('.audio-progress-bar');
            const timeLabel = container.querySelector('.audio-time-label');
            const icon = btn.querySelector('svg path');

            if (media.paused) {
                document.querySelectorAll('audio, video').forEach(m => {
                    if (m.id !== audioId && !m.closest('#videoPopup')) {
                        m.pause();
                        const otherIcon = m.closest('.audio-player-bubble')?.querySelector('.play-toggle-btn svg path');
                        if (otherIcon) otherIcon.setAttribute('d', 'M8 5v14l11-7z');
                    }
                });
                
                media.play().catch(e => {
                    console.error("재생 오류:", e);
                });
                icon.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); 
            } else {
                media.pause();
                icon.setAttribute('d', 'M8 5v14l11-7z'); 
            }

            media.ontimeupdate = () => {
                if (media.duration) {
                    const progress = (media.currentTime / media.duration) * 100;
                    progressBar.style.width = progress + '%';
                    
                    const cur = Math.floor(media.currentTime);
                    const min = Math.floor(cur / 60);
                    const sec = cur % 60;
                    timeLabel.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
                }
            };

            media.onended = () => {
                icon.setAttribute('d', 'M8 5v14l11-7z');
                progressBar.style.width = '0%';
                const dur = Math.floor(media.duration || 0);
                const min = Math.floor(dur / 60);
                const sec = dur % 60;
                timeLabel.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
            };
        }

        // 🌟 미디어가 로드되면 전체 길이를 초기에 표시해줌
        function handleMetadata(media) {
            const container = media.closest('.audio-player-bubble');
            if (!container) return;
            const timeLabel = container.querySelector('.audio-time-label');
            const dur = Math.floor(media.duration || 0);
            const min = Math.floor(dur / 60);
            const sec = dur % 60;
            timeLabel.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function handleImgError(img, fileName, fileId) {
            img.parentElement.innerHTML = `<div class="img-error"><p>로드 실패</p><a href="https://drive.google.com/file/d/${fileId}/view" target="_blank" class="text-blue-500 underline font-bold text-[10px]">보기</a></div>`;
        }

        function highlightText(text) {
            if (!activeQuery) return text.replace(/@@/g, '@@');
            const regex = new RegExp(`(${activeQuery})`, 'gi');
            return text.replace(/@@/g, '@@').replace(regex, '<mark class="highlight">$1</mark>');
        }

        function renderMessages(artist, isReset = false) {
            const chatArea = document.getElementById('chatArea');
            if (isReset) {
                chatArea.innerHTML = "";
                if (activeQuery && currentMatchIdx !== -1) {
                    const targetIdx = searchIndices[currentMatchIdx];
                    displayedCount = Math.max(displayedCount, targetIdx + 1);
                }
            }

            const start = chatArea.children.length > 0 ? (isReset ? 0 : chatArea.querySelectorAll('.msg-item').length) : 0;
            const end = isReset ? displayedCount : Math.min(start + PAGE_SIZE, currentArtistData.length);
            
            let html = "";
            let lastDate = isReset ? "" : (chatArea.querySelectorAll('.date-divider').length > 0 ? chatArea.querySelectorAll('.date-divider')[chatArea.querySelectorAll('.date-divider').length-1].innerText : "");

            for (let i = start; i < end; i++) {
                const item = currentArtistData[i];
                const dObj = parseDate(item.date);
                const dStr = dObj.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
                const tStr = dObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
                const isArt = (item.sender === artist);

                if (lastDate !== dStr) {
                    html += `<div class="date-divider w-full text-center text-[#a0a0a0] text-[11px] my-6 font-medium">${dStr}</div>`;
                    lastDate = dStr;
                }

                const rawFileName = item.fileName || "";
                const cleanFileName = rawFileName.replace(/\s+/g, '').toLowerCase();
                const superKey = superClean(rawFileName);
                const link = mediaMap[cleanFileName] || mediaMap[superKey];

                let contentHtml = "";
                if (link) {
                    const urls = getMediaUrls(link);
                    const isImg = superKey.match(/(jpg|jpeg|png|gif|webp)/i) || item.content?.includes('(사진)');
                    const isAudio = rawFileName.includes('음성');
                    
                    if (isAudio) {
                        const audioId = `audio-${i}`;
                        contentHtml = `
                            <div class="audio-player-bubble ${isArt ? 'artist' : 'user'}">
                                <video id="${audioId}" src="${urls.direct}" preload="metadata" style="display:none;" playsinline onloadedmetadata="handleMetadata(this)"></video>
                                <div class="play-toggle-btn" onclick="toggleAudio(this, '${audioId}')">
                                    <svg viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                                <div class="audio-progress-container">
                                    <div class="audio-progress-bar"></div>
                                </div>
                                <div class="audio-time-label">0:00</div>
                            </div>`;
                    } else if (isImg) {
                        contentHtml = `<div class="media-content thumbnail-mode" onclick="showPopup('${urls.id}', 'image')"><img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawFileName}', '${urls.id}')"></div>`;
                    } else {
                        contentHtml = `
                            <div class="media-content thumbnail-mode" onclick="showPopup('${urls.id}', 'video')">
                                <img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawFileName}', '${urls.id}')">
                                <div class="play-overlay"><svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
                            </div>`;
                    }
                } else {
                    const rawContent = (item.content || "");
                    contentHtml = highlightText(rawContent) || (rawFileName ? `<span class="text-xs text-gray-400 italic">[매칭 대기: ${rawFileName}]</span>` : "");
                }

                const prof = isArt ? (artist === '혀비' ? "https://pbs.twimg.com/media/HFOi5gtasAASasa?format=jpg&name=small" : "https://pbs.twimg.com/media/HFOi7g7bAAAEVPU?format=jpg&name=small") : "";

                html += `
                    <div id="msg-${i}" class="msg-item flex w-full mt-4 ${!isArt ? 'justify-end' : 'justify-start'}">
                        ${isArt ? `<div class="w-10 h-10 rounded-full overflow-hidden mr-2 flex-shrink-0 border border-gray-200"><img src="${prof}" class="w-full h-full object-cover"></div>` : ""}
                        <div class="flex flex-col max-w-[85%] ${!isArt ? 'items-end' : 'items-start'}">
                            ${isArt ? `<div class="text-[13px] text-gray-800 mb-1 font-bold">${item.sender}</div>` : ""}
                            <div class="flex items-end gap-2 ${!isArt ? 'flex-row-reverse' : 'flex-row'}">
                                <div class="bubble-content transition-all duration-500 ${link ? '' : 'px-4 py-2.5 text-[14px] shadow-sm ' + (!isArt ? 'bg-[#646464] text-white rounded-l-[18px] rounded-tr-[18px] rounded-br-[4px]' : 'bg-white text-gray-900 rounded-r-[18px] rounded-bl-[18px] rounded-tl-[4px]')}">
                                    ${contentHtml}
                                </div>
                                <div class="text-[10px] text-[#a3a3a3] min-w-max mb-1">${tStr}</div>
                            </div>
                        </div>
                    </div>`;
            }

            chatArea.insertAdjacentHTML('beforeend', html);
            if (!isReset) displayedCount = end;
        }

        function renderGallery() {
            const galleryArea = document.getElementById('galleryArea');
            const mediaItems = currentArtistData.filter(item => {
                const rawName = item.fileName || "";
                const cleanName = rawName.replace(/\s+/g, '').toLowerCase();
                const superKey = superClean(rawName);
                return mediaMap[cleanName] || mediaMap[superKey];
            });

            if (mediaItems.length === 0) {
                galleryArea.innerHTML = `<div class="p-10 text-center text-gray-400 text-sm">미디어가 없습니다.</div>`;
                return;
            }

            let html = `<div class="gallery-grid">`;
            mediaItems.forEach(item => {
                const rawName = item.fileName || "";
                const cleanName = rawName.replace(/\s+/g, '').toLowerCase();
                const superKey = superClean(rawName);
                const link = mediaMap[cleanName] || mediaMap[superKey];
                const urls = getMediaUrls(link);
                const isImg = superKey.match(/(jpg|jpeg|png|gif|webp)/i) || item.content?.includes('(사진)');
                const isAudio = rawName.includes('음성');

                html += `
                    <div class="gallery-item" onclick="showPopup('${urls.id}', '${isImg ? 'image' : 'video'}')">
                        <img src="${urls.image}" loading="lazy" onerror="handleImgError(this, '${rawName}', '${urls.id}')">
                        <div class="absolute top-1 right-1 text-white drop-shadow-md">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                ${isAudio ? '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>' : (isImg ? '' : '<path d="M8 5v14l11-7z"/>')}
                            </svg>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            galleryArea.innerHTML = html;
        }

        function enterChat(artist) {
            currentArtistName = artist;
            currentArtistData = (artist === '혀비' ? shData : hsData);
            displayedCount = PAGE_SIZE;

            document.getElementById('selectionScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('roomName').innerText = artist;
            
            switchView('chat');
            document.getElementById('chatArea').innerHTML = "";
            document.getElementById('galleryArea').innerHTML = "";
            document.getElementById('searchInput').value = "";
            document.getElementById('searchContainer').classList.remove('active');
            document.getElementById('searchNav').classList.add('hidden');
            document.getElementById('clearSearchBtn').classList.add('hidden');
            activeQuery = "";

            renderMessages(artist, true);
            
            const chatArea = document.getElementById('chatArea');
            chatArea.onscroll = function() {
                if (currentView === 'chat' && !activeQuery && this.scrollHeight - this.scrollTop <= this.clientHeight + 200) {
                    renderMessages(currentArtistName);
                }
            };
        }
    </script>
</body>
</html>
